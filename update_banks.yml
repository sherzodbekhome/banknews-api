name: Update Bank Rates

on:
  schedule:
    # Har kuni soat 08:00, 12:00, 18:00 da (UTC+5 = 03:00, 07:00, 13:00 UTC)
    - cron: '0 3 * * *'
    - cron: '0 7 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:  # Qo'lda ham ishga tushirish mumkin

jobs:
  scrape-banks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Scrape bank rates
        run: python scripts/scrape_banks.py

      - name: Commit updated rates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/banks_data.json
          git diff --staged --quiet || git commit -m "🏦 Bank kurslari yangilandi: $(date '+%Y-%m-%d %H:%M')"
          git push
